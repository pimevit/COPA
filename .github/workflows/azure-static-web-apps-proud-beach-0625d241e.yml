name: Frontend - Build and deploy to Azure Static Web App

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-azure-static-webapp.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-azure-static-webapp-production
  cancel-in-progress: false

env:
  NODE_VERSION: '24.x'
  APP_LOCATION: frontend
  DIST_LOCATION: frontend/dist

jobs:
  build-and-deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ${{ env.APP_LOCATION }}

      - name: Test frontend
        run: npm test
        working-directory: ${{ env.APP_LOCATION }}

      - name: Validate production API URL
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Repository variable VITE_API_BASE_URL must point to the backend App Service URL." >&2
            exit 1
          fi

      - name: Build frontend
        run: npm run build
        working-directory: ${{ env.APP_LOCATION }}
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: ${{ env.DIST_LOCATION }}
          output_location: ''
          skip_app_build: true
