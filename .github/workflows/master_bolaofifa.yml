name: Backend - Build and deploy to Azure Web App
 
on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/master_bolaofifa.yml'
  workflow_dispatch:
 
permissions:
  contents: read
 
concurrency:
  group: backend-azure-webapp-production
  cancel-in-progress: false
 
env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release
  SOLUTION_PATH: backend/BolaoCopa.sln
  API_PROJECT_PATH: backend/src/BolaoCopa.Api/BolaoCopa.Api.csproj
  PUBLISH_DIR: backend/publish
  AZURE_WEBAPP_NAME: bolaserieA
 
jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
 
      - name: Restore backend
        run: dotnet restore ${{ env.SOLUTION_PATH }}
 
      - name: Build backend
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore
 
      - name: Test backend
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal
 
      - name: Publish API
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration ${{ env.CONFIGURATION }} --no-build --output ${{ env.PUBLISH_DIR }} -p:UseAppHost=false
 
      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-api
          path: ${{ env.PUBLISH_DIR }}
          if-no-files-found: error
          retention-days: 7
 
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
 
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-api
          path: backend-api

      - name: Validate Azure publish profile secret
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "GitHub secret AZURE_WEBAPP_PUBLISH_PROFILE is required for azure/webapps-deploy." >&2
            echo "Create it in GitHub repository secrets or in the production environment secrets." >&2
            exit 1
          fi

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend-api
