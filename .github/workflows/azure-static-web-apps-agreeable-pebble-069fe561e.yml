name: Frontend - Azure Static Web App (agreeable-pebble)

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-static-web-apps-agreeable-pebble-069fe561e.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-static-web-apps-agreeable-pebble-069fe561e.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: frontend-azure-static-webapp-agreeable-pebble
  cancel-in-progress: false

env:
  NODE_VERSION: '24.x'
  APP_LOCATION: frontend
  DIST_LOCATION: frontend/dist
  PUBLIC_SITE_URL: https://agreeable-pebble-069fe561e.7.azurestaticapps.net

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and deploy frontend
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ${{ env.APP_LOCATION }}

      - name: Test frontend
        run: npm test
        working-directory: ${{ env.APP_LOCATION }}

      - name: Validate production API URL
        if: github.event_name != 'pull_request'
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Repository variable VITE_API_BASE_URL must point to the backend App Service URL." >&2
            exit 1
          fi

      - name: Build frontend
        run: npm run build
        working-directory: ${{ env.APP_LOCATION }}
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Validate built frontend output
        run: |
          if [ ! -f "${DIST_LOCATION}/index.html" ]; then
            echo "Expected ${DIST_LOCATION}/index.html to exist after the frontend build." >&2
            exit 1
          fi

          if [ ! -f "${DIST_LOCATION}/staticwebapp.config.json" ]; then
            echo "Expected ${DIST_LOCATION}/staticwebapp.config.json to be copied from frontend/public." >&2
            exit 1
          fi

          if grep -q '/src/main.tsx' "${DIST_LOCATION}/index.html"; then
            echo "Built index.html still points to Vite source files instead of compiled assets." >&2
            exit 1
          fi

          if ! find "${DIST_LOCATION}/assets" -maxdepth 1 -type f -name '*.js' | grep -q .; then
            echo "Expected at least one compiled JavaScript asset in ${DIST_LOCATION}/assets." >&2
            exit 1
          fi

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_PEBBLE_069FE561E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.APP_LOCATION }}
          api_location: ''
          output_location: dist

      - name: Verify deployed frontend
        if: github.event_name != 'pull_request'
        run: |
          sleep 15
          deployed_index="$(curl --fail --silent --show-error --location "${PUBLIC_SITE_URL}/?deploy_check=${GITHUB_RUN_ID}")"

          if echo "$deployed_index" | grep -q '/src/main.tsx'; then
            echo "Deployed site still points to Vite source files instead of compiled assets." >&2
            exit 1
          fi

          if ! echo "$deployed_index" | grep -q '/assets/.*\.js'; then
            echo "Deployed site does not reference compiled JavaScript assets." >&2
            exit 1
          fi

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close pull request

    steps:
      - name: Close pull request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_PEBBLE_069FE561E }}
          action: close
